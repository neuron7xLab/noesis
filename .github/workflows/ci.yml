name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,serve,llm]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest (+ coverage gate)
        run: python -m pytest -q
