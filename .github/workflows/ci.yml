name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev,serve,llm]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest (+ coverage gate)
        run: python -m pytest -q

  validity-gates:
    # Enforce the system's OWN fail-closed self-checks (exit!=0 blocks merge).
    # These already exist as CLI commands; this job turns them into enforcement.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev,serve,llm]"
      - name: Discriminant validity (gate AUC >= 0.7)
        run: python -m noesis.cli discriminate
      - name: Proxy construct validity (clean > degraded, AUC >= 0.7)
        run: python -m noesis.cli proxy-matrix
      - name: Physics boundary contract
        run: python -m noesis.cli physics-boundary validate
      - name: Bibliography claim-validity verdict (no unsourced/miscast claims)
        run: python -m noesis.cli bibliography verdict
