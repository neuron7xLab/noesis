name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev,serve,llm]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (strict)
        run: mypy
      - name: Pytest
        run: python -m pytest -q
